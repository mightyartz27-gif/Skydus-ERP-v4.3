function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function fmtShort(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function stockClass(qty){if(qty===undefined||qty===null)return'stock-ok';if(qty<=0)return'stock-out';if(qty<=5)return'stock-low';return'stock-ok';}
function stockLabel(qty){if(qty===undefined||qty===null)return'?u';if(qty<=0)return'Épuisé';if(qty<=5)return qty+'u ⚠';return qty+'u';}

// Inventory value = sum of (currentQty × currentPriceBought) for all items with qty > 0
function getInventoryValue(){
  let total=0;
  DB.products.forEach(p=>{
    p.items.forEach(i=>{
      if((i.qty||0)>0) total+=(i.priceBought||0)*(i.qty||0);
    });
  });
  return total;
}

// Total cost of current stock (same as inventory value — state-based)
function getCurrentStockCost(){
  return getInventoryValue();
}

// ══ PURCHASE HISTORY LOGGING (pure log — never used for totals) ══
function logPurchaseHistory(type,productId,fournisseurId,qty,price,note){
  if(!DB.purchaseHistory)DB.purchaseHistory=[];
  const productName=DB.products.find(p=>p.id===productId)?.name||'?';
  const fournisseurName=DB.fournisseurs.find(f=>f.id===fournisseurId)?.name||'?';
  DB.purchaseHistory.push({
    id:dbId(),type,productId,fournisseurId,
    productName,fournisseurName,
    qty,price,
    // amount logged = qty × price at time of action (for history display only)
    amount:(price||0)*(qty||0),
    note:note||'',date:ts()
  });
}

// ══ INCOMPLETE DATA DETECTION ══
function getIncompleteClients(){return DB.clients.filter(c=>c.autoCreated);}
function getIncompleteProducts(){return DB.products.filter(p=>p.autoCreated||p.items.some(i=>i.fournisseurId===null||i.fournisseurId===undefined||i.priceBought===0));}
function getIncompleteFournisseurs(){return DB.fournisseurs.filter(f=>f.autoCreated);}

}

function snack(msg,type='info',dur=4000){
  clearTimeout(snackTimer);
  const icons={info:'info',success:'check_circle',warning:'warning',danger:'error'};
  document.getElementById('snk-icon').textContent=icons[type]||'info';
  document.getElementById('snk-msg').textContent=msg;
  const s=document.getElementById('snackbar');s.className='show';
  snackTimer=setTimeout(dismissSnack,dur);
}
function dismissSnack(){clearTimeout(snackTimer);document.getElementById('snackbar').className='';}

// ══ SYNC ══
function isConfigured(){return HARD_CFG.apiKey&&HARD_CFG.binId;}
function setSyncUI(state,label){const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(d)d.className='sync-dot '+state;if(l)l.textContent=label||'';}
async function loadFromBin(){
  if(!isConfigured()){setSyncUI('error','Non configuré');return false;}
  setSyncUI('syncing','Chargement...');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${HARD_CFG.binId}/latest`,{headers:{'X-Master-Key':HARD_CFG.apiKey}});
    if(!r.ok)throw new Error(r.status);
    const rec=(await r.json()).record;
    if(rec){
      if(!rec.expenses)rec.expenses=[];
      if(!rec.stockHistory)rec.stockHistory=[];
      if(!rec.purchaseHistory)rec.purchaseHistory=[];
      Object.assign(DB,rec);
    }
    setSyncUI('synced','Synchronisé ✓');return true;
  }catch(e){setSyncUI('error','Erreur sync');return false;}
}
async function saveToBin(){
  if(!isConfigured()||isSaving)return;
  isSaving=true;setSyncUI('syncing','Sauvegarde...');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${HARD_CFG.binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':HARD_CFG.apiKey,'X-Bin-Versioning':'false'},body:JSON.stringify(DB)});
    if(!r.ok)throw new Error(r.status);
    setSyncUI('synced','Synchronisé ✓');
    localStorage.setItem('skydus_db_v4',JSON.stringify(DB));
  }catch(e){setSyncUI('error','Erreur sauvegarde');}
  isSaving=false;
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveToBin,800);}

// ══ CREDIT ══
function getCreditTotal(cid){
  return DB.sales.filter(s=>s.clientId===cid).reduce((sum,s)=>{
    const t=getSaleTotal(s);const p=(s.payments||[]).reduce((a,x)=>a+x.amount,0);
    return sum+Math.max(0,t-p);
  },0);
}
function getSaleTotal(s){
  if(s.items&&s.items.length)return s.items.reduce((a,i)=>a+i.priceSold*i.qty,0);
  return (s.priceSold||0)*(s.qty||0);
}
function getSaleGain(s){
  if(s.items&&s.items.length)return s.items.reduce((a,i)=>a+(i.priceSold-i.priceBought)*i.qty,0);
  return ((s.priceSold||0)-(s.priceBought||0))*(s.qty||0);
}
function getSalePaid(s){return(s.payments||[]).reduce((a,p)=>a+p.amount,0);}

// Manual expenses total — filtered by date range (null = all time)
function getManualExpensesTotal(from, to){
  return (DB.expenses||[]).filter(e=>{
    if(e.type!=='manuel')return false;
    if(!from&&!to)return true;
    const d=new Date(e.date);
    return d>=from&&d<=to;
  }).reduce((s,e)=>s+e.amount,0);
}

// ══ MODAL — no scroll-close ══
function showModal(bodyHtml){
  const titleMatch=bodyHtml.match(/<div class="mtitle">([\s\S]*?)<\/div>/);
  const titleHtml=titleMatch?titleMatch[1]:'';
  const restHtml=bodyHtml.replace(/<div class="mtitle">[\s\S]*?<\/div>/,'');
  const existing=document.getElementById('modal-backdrop');if(existing)existing.remove();
  const d=document.createElement('div');
  d.className='modal-backdrop';d.id='modal-backdrop';
  d.addEventListener('mousedown',e=>{if(e.target===d)closeModal();});
  d.addEventListener('touchstart',e=>{if(e.target===d)closeModal();},{passive:true});
  d.innerHTML=`<div class="modal" id="modal-inner">
    <div class="mhandle"></div>
    <div class="modal-topbar">
      <div class="mtitle">${titleHtml}</div>
      <button class="modal-close-btn" onclick="closeModal()">
        <span class="material-symbols-outlined" style="font-size:18px">close</span>
      </button>
    </div>
    <div id="modal-body">${restHtml}</div>
  </div>`;
  document.body.appendChild(d);
  document.body.style.overflow='hidden';
  try{history.pushState({page:currentPage,modal:true},'',window.location.pathname);}catch(e){}
  let startY=0,dragging=false;
  const inner=d.querySelector('.modal');
  const handle=d.querySelector('.mhandle');
  handle.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dragging=true;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0&&inner.scrollTop===0){inner.style.transform=`translateY(${Math.min(dy,200)}px)`;inner.style.transition='none';}
  },{passive:true});
  inner.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    inner.style.transition='';inner.style.transform='';
    if(dy>100)closeModal();
  },{passive:true});
}
function closeModal(silent=false){
  const m=document.getElementById('modal-backdrop');if(m)m.remove();
  document.body.style.overflow='';
  if(!silent)renderPage(currentPage);
}

// ══ FAB ══

  const cfgs={dashboard:{icon:'add_shopping_cart',action:'showNewSaleModal()'},products:{icon:'add',action:'showProductModal()'},clients:{icon:'person_add',action:'showClientModal()'},fournisseurs:{icon:'add',action:'showFournisseurModal()'}};
  const cfg=cfgs[page];if(!cfg)return;
  const fab=document.createElement('button');fab.className='fab';fab.id='main-fab';
  fab.innerHTML=`<span class="material-symbols-rounded" style="font-size:26px">${cfg.icon}</span>`;
  fab.onclick=()=>eval(cfg.action);
  document.body.appendChild(fab);
}

// DASHBOARD
// ══════════════════════════════════════════
function getDashYears(){
  const yrs=new Set();
  DB.sales.forEach(s=>{if(s.date)yrs.add(new Date(s.date).getFullYear());});
  yrs.add(new Date().getFullYear());
  return [...yrs].sort((a,b)=>b-a);
}
function filterSalesByMonthYear(month,year){
  return DB.sales.filter(s=>{const d=new Date(s.date);return d.getMonth()===month&&d.getFullYear()===year;});
}

function renderDashboard(){
  const now=new Date();
  const sales=filterSalesByMonthYear(dashMonth,dashYear);
  const totalSales=sales.reduce((s,v)=>s+getSaleTotal(v),0);
  const grossGain=sales.reduce((s,v)=>s+getSaleGain(v),0);
  // Expenses filtered to the same month/year as the dashboard filter
  const from=new Date(dashYear,dashMonth,1);
  const to=new Date(dashYear,dashMonth+1,0,23,59,59,999);
  const manualExp=getManualExpensesTotal(from,to);
  const netGain=grossGain-manualExp;
  const totalCredit=DB.clients.reduce((s,c)=>s+getCreditTotal(c.id),0);
  const recent=[...sales].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const outOfStock=DB.products.filter(p=>p.items.some(i=>i.qty<=0));
  const lowStock=DB.products.filter(p=>p.items.some(i=>i.qty>0&&i.qty<=5));
  const dueRem=DB.reminders.filter(r=>!r.done&&new Date(r.date)<=new Date());
  const incClients=getIncompleteClients(),incProducts=getIncompleteProducts(),incFourn=getIncompleteFournisseurs();
  const allGain=DB.sales.reduce((s,v)=>s+getSaleGain(v),0)-getManualExpensesTotal(null,null);
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const years=getDashYears();

  const daysInMonth=new Date(dashYear,dashMonth+1,0).getDate();
  let cd=[];
  for(let i=1;i<=daysInMonth;i+=3){
    const g=sales.filter(s=>{const d=new Date(s.date);return d.getDate()>=i&&d.getDate()<i+3;}).reduce((a,s)=>a+getSaleGain(s),0);
    cd.push({label:i+'',gain:g});
  }
  const maxG=Math.max(...cd.map(d=>Math.abs(d.gain)),1);

  let incompleteWarnings='';
  if(incClients.length)incompleteWarnings+=`<div class="al ald" style="cursor:pointer;align-items:center" onclick="navigate('clients')">${ico('warning')} <div style="flex:1"><strong>${incClients.length} client(s) incomplet(s)</strong><br><span style="font-size:11px">Cliquez pour compléter</span></div>${ico('arrow_forward')}</div>`;
  if(incProducts.length)incompleteWarnings+=`<div class="al ald" style="cursor:pointer;align-items:center" onclick="navigate('products')">${ico('warning')} <div style="flex:1"><strong>${incProducts.length} article(s) incomplet(s)</strong><br><span style="font-size:11px">Cliquez pour compléter</span></div>${ico('arrow_forward')}</div>`;
  if(incFourn.length)incompleteWarnings+=`<div class="al ald" style="cursor:pointer;align-items:center" onclick="navigate('fournisseurs')">${ico('warning')} <div style="flex:1"><strong>${incFourn.length} fournisseur(s) incomplet(s)</strong><br><span style="font-size:11px">Cliquez pour compléter</span></div>${ico('arrow_forward')}</div>`;

  return`<div class="page">
  <div class="cap-bar"><div class="cap-icon">${ico('account_balance_wallet')}</div><div style="flex:1"><div style="font-size:11px;color:var(--text-dim)">Capital + Gains cumulés nets</div><div style="font-size:18px;font-weight:700">${fmt(DB.capital+allGain)}</div></div><button class="btn bo bsm" onclick="showCapitalModal()">${ico('edit')}</button></div>
  ${incompleteWarnings}
  ${outOfStock.length?`<div class="al ald" style="cursor:pointer;align-items:center" onclick="showOutOfStockProducts()">${ico('error')} <div style="flex:1"><strong>${outOfStock.length} article(s) épuisé(s)</strong><br><span style="font-size:11px">${outOfStock.map(p=>esc(p.name)).join(', ')}</span></div>${ico('arrow_forward')}</div>`:''}
  ${lowStock.length?`<div class="al alw">${ico('warning')} ${lowStock.length} article(s) en stock bas (≤5)</div>`:''}
  ${dueRem.length?`<div class="al alw">${ico('notifications_active')} ${dueRem.length} rappel(s) en attente <button class="btn bg-btn bsm" onclick="showReminders()">Voir</button></div>`:''}
  <div class="dash-filter-bar">
    <select class="fc" style="flex:1" onchange="dashMonth=parseInt(this.value);renderPage('dashboard')">
      ${months.map((m,i)=>`<option value="${i}" ${dashMonth===i?'selected':''}>${m}</option>`).join('')}
    </select>
    <select class="fc" style="flex:1" onchange="dashYear=parseInt(this.value);renderPage('dashboard')">
      ${years.map(y=>`<option value="${y}" ${dashYear===y?'selected':''}>${y}</option>`).join('')}
    </select>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">💰 Ventes</div><div class="stat-value sv-blue">${fmt(totalSales)}</div></div>
    <div class="stat-card"><div class="stat-label">📈 Gain Brut</div><div class="stat-value ${grossGain>=0?'sv-pos':'sv-neg'}">${fmt(grossGain)}</div></div>
    <div class="stat-card"><div class="stat-label">📦 Transactions</div><div class="stat-value">${sales.length}</div></div>
    <div class="stat-card"><div class="stat-label">⏳ Crédits Dus</div><div class="stat-value sv-neg">${fmt(totalCredit)}</div></div>
    <div class="stat-card" style="grid-column:span 2"><div class="stat-label">💵 Gain Net (après dépenses)</div><div class="stat-value ${netGain>=0?'sv-pos':'sv-neg'}">${fmt(netGain)}</div><div class="tsm tmut" style="margin-top:4px">Dépenses manuelles: ${fmt(manualExp)}</div></div>
  </div>
  <div class="card"><div class="card-title">${ico('show_chart')} Gains — ${months[dashMonth]} ${dashYear}</div><div class="chart-bars">${cd.map(d=>{const h=Math.abs(d.gain/maxG*100);const c=d.gain>=0?'linear-gradient(180deg,#10b981,#059669)':'linear-gradient(180deg,#ef4444,#dc2626)';return`<div class="cb" style="height:${Math.max(h,4)}%;background:${c}" title="${fmt(d.gain)}"></div>`;}).join('')}</div><div class="chart-labels">${cd.map(d=>`<span>${d.label}</span>`).join('')}</div></div>
  <div class="sh"><div style="font-size:16px;font-weight:700">Ventes Récentes</div><button class="btn bg-btn bsm" onclick="showAllSales()">Tout voir</button></div>
  ${recent.length?recent.map(s=>{const cl=DB.clients.find(c=>c.id===s.clientId);const g=getSaleGain(s);const tot=getSaleTotal(s);const label=s.items&&s.items.length>1?`${s.items.length} articles`:(s.items?s.items[0]?.productName:s.productName)||'?';return`<div class="li click" onclick="showSaleDetail(${s.id})"><div class="lav" style="background:rgba(59,130,246,.15);color:var(--primary-light)">${esc((label||'?').substring(0,2).toUpperCase())}</div><div class="lc"><div class="lt">${esc(label)}</div><div class="ls">${cl?esc(cl.name):'?'} • ${fmtShort(s.date)}</div></div><div class="lr"><div class="bold">${fmt(tot)}</div><div class="tsm ${g>=0?'tsuc':'tdan'}">${fmt(g)}</div></div></div>`;}).join(''):`<div class="empty">${ico('receipt_long')}<p>Aucune vente ce mois</p></div>`}

  </div>`;
}

function renderProducts(){
  const incProducts=getIncompleteProducts();
  // State-based: calculated from current product.items
  const invValue=getInventoryValue();
  return`<div class="page">
  <div class="sh"><div style="font-size:20px;font-weight:700">Articles</div><button class="btn bp bsm" onclick="showProductModal()">${ico('add')} Ajouter</button></div>
  <div class="inv-value-bar">
    <div style="width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ico('warehouse')}</div>
    <div style="flex:1"><div style="font-size:11px;color:var(--text-dim)">Valeur Totale du Stock (articles non épuisés)</div><div style="font-size:18px;font-weight:700;color:var(--primary-light)">${fmt(invValue)}</div></div>
  </div>
  ${incProducts.length?`<div class="al ald">${ico('warning')} ${incProducts.length} article(s) avec informations incomplètes.</div>`:''}
  <div class="sb">${ico('search')}<input type="text" placeholder="Rechercher..." id="product-search" oninput="filterProducts(this.value)"></div>
  <div id="products-list">${renderPL(DB.products)}</div>
  </div>`;
}
function renderPL(prods){
  if(!prods.length)return`<div class="empty">${ico('inventory_2')}<p>Aucun article.</p></div>`;
  return prods.map(p=>{
    const tq=p.items.reduce((s,i)=>s+(i.qty||0),0);
    const sc=stockClass(tq);
    const incomplete=p.autoCreated||p.items.some(i=>!i.fournisseurId||i.priceBought===0);
    // State-based per-product value
    const val=p.items.reduce((s,i)=>(i.qty||0)>0?s+(i.priceBought||0)*(i.qty||0):s,0);
    return`<div class="li" style="${incomplete?'border-color:rgba(239,68,68,.4)':''}">

function saveP(){

function addStockToExisting(productId,fId,buy,qty,sell){
  const p=DB.products.find(x=>x.id===productId);if(!p)return;
  if(fId){
    const exItem=p.items.find(i=>i.fournisseurId===fId);
    if(exItem){
      const oldQty=exItem.qty||0;const oldPrice=exItem.priceBought;
      exItem.qty=oldQty+qty;
      if(buy>0)exItem.priceBought=buy;
      if(sell>0)exItem.priceSell=sell;
      if(buy>0&&buy!==oldPrice)logPurchaseHistory('price_change',productId,fId,qty,buy,`Prix modifié: ${fmt(oldPrice)} → ${fmt(buy)}`);
    } else if(qty>0||buy>0){
      p.items.push({fournisseurId:fId,priceBought:buy,priceSell:sell||buy*1.2,qty,addedAt:ts()});
      logPurchaseHistory('stock_add',productId,fId,qty,buy,'Nouveau stock ajouté');
    }
    if(qty>0)logStockHistory(productId,fId,qty,buy,'achat');
  }
  scheduleSave();closeModal();snack(`Stock ajouté à "${p.name}" ✓`,'success');
}
function createNewProductForced(name,fId,buy,qty,sell){doCreateProduct(name,fId,buy,qty,sell,false);}
function doCreateProduct(name,fId,buy,qty,sell,checkDup=true){
  const items=[];
  if(fId&&(buy>0||qty>0)){items.push({fournisseurId:fId,priceBought:buy,priceSell:sell||buy*1.2,qty:qty||0,addedAt:ts()});}
  const cat=document.getElementById('p-cat')?.value||'';
  const unit=document.getElementById('p-unit')?.value||'pcs';
  const desc=document.getElementById('p-desc')?.value||'';
  const np={id:dbId(),name,category:cat,unit,description:desc,createdAt:ts(),items};
  DB.products.push(np);
  if(fId&&qty>0){
    logStockHistory(np.id,fId,qty,buy,'achat');
    logPurchaseHistory('stock_add',np.id,fId,qty,buy,'Stock initial créé');
  }
  scheduleSave();closeModal();snack(`${name} ajouté ✓`,'success');
}

function editStockHistoryEntry(productId,histId){
  const h=(DB.stockHistory||[]).find(x=>x.id===histId);if(!h)return;
  showModal(`<div class="mtitle">${ico('edit')} Modifier Approvisionnement</div>
  <div class="al ali">${ico('info')} La modification ajuste le stock actuel de la différence.</div>
  <div class="fg"><label class="fl">Quantité</label><input type="number" class="fc" id="she-qty" value="${h.qty}" min="1"></div>
  <div class="fg"><label class="fl">Prix achat (DT)</label><input type="number" class="fc" id="she-price" value="${h.price}" step="0.01"></div>
  <div class="fg"><label class="fl">Date</label><input type="datetime-local" class="fc" id="she-date" value="${h.date?new Date(h.date).toISOString().slice(0,16):''}"></div>
  <div class="fctr mt16" style="gap:8px"><button class="btn bo" style="flex:1" onclick="closeModal();showProductDetail(${productId})">Annuler</button><button class="btn bp" style="flex:1" onclick="saveStockHistoryEdit(${productId},${histId})">Enregistrer</button></div>`);
}
function saveStockHistoryEdit(productId,histId){
  const h=(DB.stockHistory||[]).find(x=>x.id===histId);if(!h)return;
  const oldQty=h.qty,oldPrice=h.price;
  const newQty=parseInt(document.getElementById('she-qty').value)||h.qty;
  const newPrice=parseFloat(document.getElementById('she-price').value)||h.price;
  const newDate=document.getElementById('she-date').value;
  const diff=newQty-oldQty; // positive = more stock was added than before
  // Adjust current product stock by the difference
  const p=DB.products.find(x=>x.id===productId);
  if(p){
    const item=p.items.find(i=>i.fournisseurId===h.fournisseurId);
    if(item){
      item.qty=Math.max(0,(item.qty||0)+diff);
      if(newPrice!==oldPrice)item.priceBought=newPrice;
    }
  }
  h.qty=newQty;h.price=newPrice;
  if(newDate)h.date=new Date(newDate).toISOString();
  // Log the change
  if(diff!==0)logPurchaseHistory(diff>0?'stock_add':'stock_delete',productId,h.fournisseurId,Math.abs(diff),newPrice,`Appro. modifié: ${oldQty}u → ${newQty}u`);
  if(newPrice!==oldPrice)logPurchaseHistory('price_change',productId,h.fournisseurId,newQty,newPrice,`Prix modifié: ${fmt(oldPrice)} → ${fmt(newPrice)}`);
  scheduleSave();closeModal();snack('Approvisionnement modifié ✓','success');showProductDetail(productId);
}
function deleteStockHistoryEntry(productId,histId){
  const h=(DB.stockHistory||[]).find(x=>x.id===histId);if(!h)return;
  showModal(`<div class="mtitle" style="color:var(--danger)">${ico('warning')} Confirmer</div>
  <div class="al ald">Supprimer ce provisionnement (+${h.qty}u @ ${fmt(h.price)})? Le stock actuel sera réduit.</div>
  <div class="fctr mt16" style="gap:8px"><button class="btn bo" style="flex:1" onclick="closeModal();showProductDetail(${productId})">Annuler</button><button class="btn bd" style="flex:1" onclick="doDeleteStockHistory(${productId},${histId})">Supprimer</button></div>`);
}
function doDeleteStockHistory(productId,histId){
  const h=(DB.stockHistory||[]).find(x=>x.id===histId);if(!h)return;
  const p=DB.products.find(x=>x.id===productId);
  // Reduce current stock by the quantity this history entry added
  if(p){const item=p.items.find(i=>i.fournisseurId===h.fournisseurId);if(item)item.qty=Math.max(0,(item.qty||0)-h.qty);}
  logPurchaseHistory('stock_delete',productId,h.fournisseurId,h.qty,h.price,`Appro. supprimé: ${h.qty}u @ ${fmt(h.price)}`);
  DB.stockHistory=(DB.stockHistory||[]).filter(x=>x.id!==histId);
  scheduleSave();closeModal();snack('Supprimé ✓','success');showProductDetail(productId);
}

function editStockQty(productId,itemIdx){
  const p=DB.products.find(x=>x.id===productId);if(!p)return;
  const i=p.items[itemIdx];if(!i)return;
  const fOpts=DB.fournisseurs.map(f=>`<option value="${f.id}" ${i.fournisseurId===f.id?'selected':''}>${esc(f.name)}</option>`).join('');

  <div class="fr">
    <div class="fg"><label class="fl">Quantité actuelle</label><input type="number" class="fc" id="esq-qty" value="${i.qty||0}" min="0"></div>
    <div class="fg"><label class="fl">Prix achat (DT)</label><input type="number" class="fc" id="esq-buy" value="${i.priceBought||0}" step="0.01"></div>
  </div>
  <div class="fg"><label class="fl">Prix vente (DT)</label><input type="number" class="fc" id="esq-sell" value="${i.priceSell||0}" step="0.01"></div>
  <div class="fctr mt16" style="gap:8px"><button class="btn bo" style="flex:1" onclick="closeModal();showProductDetail(${productId})">Annuler</button><button class="btn bp" style="flex:1" onclick="saveStockQty(${productId},${itemIdx})">Enregistrer</button></div>`);
}
function saveStockQty(productId,itemIdx){
  const p=DB.products.find(x=>x.id===productId);if(!p)return;
  const i=p.items[itemIdx];if(!i)return;
  const oldQty=i.qty||0,oldPrice=i.priceBought;
  const qty=parseInt(document.getElementById('esq-qty').value);
  const buy=parseFloat(document.getElementById('esq-buy').value);
  const sell=parseFloat(document.getElementById('esq-sell').value);
  const fid=parseInt(document.getElementById('esq-fourn').value)||i.fournisseurId;
  if(isNaN(qty)||qty<0)return snack('Quantité invalide','danger');
  const diff=qty-oldQty;
  i.qty=qty;i.fournisseurId=fid;
  if(!isNaN(buy)&&buy!==oldPrice){i.priceBought=buy;logPurchaseHistory('price_change',productId,fid,qty,buy,`Prix modifié: ${fmt(oldPrice)} → ${fmt(buy)}`);}
  if(!isNaN(sell))i.priceSell=sell;
  if(diff!==0)logPurchaseHistory(diff>0?'stock_add':'stock_delete',productId,fid,Math.abs(diff),buy||oldPrice,`Quantité modifiée: ${oldQty} → ${qty}`);
  if(p.autoCreated&&fid&&buy>0)p.autoCreated=false;
  scheduleSave();closeModal();snack('Stock modifié ✓','success');showProductDetail(productId);
}

function logStockHistory(productId,fournisseurId,qty,price,type='achat'){
  if(!DB.stockHistory)DB.stockHistory=[];
  DB.stockHistory.push({id:dbId(),productId,fournisseurId,qty,price,type,date:ts()});
}

  <div class="fg"><label class="fl">Prix vente suggéré (DT)</label><input type="number" class="fc" id="as-sell" placeholder="0.00" step="0.01"></div>
  <div class="fctr mt16" style="gap:8px"><button class="btn bo" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn bp" style="flex:1" onclick="saveAS(${pid})">Ajouter</button></div>`);
  if(existingF.length){document.getElementById('as-fourn').value=existingF[0].id;prefillStockFromFourn(pid);}
}
function onAsFournChange(pid){
  const val=document.getElementById('as-fourn').value;
  const wrap=document.getElementById('as-new-fourn-wrap');
  if(wrap)wrap.style.display=val==='new'?'block':'none';
  if(val&&val!=='new')prefillStockFromFourn(pid);
}
function prefillStockFromFourn(pid){
  const p=DB.products.find(x=>x.id===pid);if(!p)return;
  const fid=parseInt(document.getElementById('as-fourn').value);
  const item=p.items.find(i=>i.fournisseurId===fid);
  if(item){
    const buyEl=document.getElementById('as-buy'),sellEl=document.getElementById('as-sell');
    if(buyEl&&item.priceBought)buyEl.value=item.priceBought.toFixed(2);
    if(sellEl&&item.priceSell)sellEl.value=item.priceSell.toFixed(2);
  }
}
function saveAS(pid){
  const p=DB.products.find(x=>x.id===pid);if(!p)return;
  let fId=parseInt(document.getElementById('as-fourn').value)||null;
  const fVal=document.getElementById('as-fourn').value;
  if(fVal==='new'){
    const fname=document.getElementById('as-new-fourn-name')?.value.trim();
    if(!fname)return snack('Nom du fournisseur requis','danger');
    const nf={id:dbId(),name:fname,phone:'',email:'',address:'',createdAt:ts()};
    DB.fournisseurs.push(nf);fId=nf.id;
  }
  const buy=parseFloat(document.getElementById('as-buy').value);
  const qty=parseInt(document.getElementById('as-qty').value);
  const sell=parseFloat(document.getElementById('as-sell').value)||buy*1.2;
  if(isNaN(buy)||isNaN(qty)||qty<=0)return snack('Données invalides','danger');
  if(!fId)return snack('Fournisseur requis','danger');
  // Update current stock state
  const ex=p.items.find(i=>i.fournisseurId===fId);
  if(ex){ex.qty=(ex.qty||0)+qty;ex.priceBought=buy;ex.priceSell=sell;}
  else p.items.push({fournisseurId:fId,priceBought:buy,priceSell:sell,qty,addedAt:ts()});
  if(p.autoCreated)p.autoCreated=false;
  // Log to history (log only — not used for totals)
  logStockHistory(pid,fId,qty,buy,'achat');
  logPurchaseHistory('stock_add',pid,fId,qty,buy,'Approvisionnement');
  // Log expense for cost tracking
  if(!DB.expenses)DB.expenses=[];
  DB.expenses.push({id:dbId(),type:'achat',productId:pid,fournisseurId:fId,amount:buy*qty,qty,price:buy,date:ts(),note:`Appro. ${p.name}`});
  scheduleSave();closeModal();snack('Stock ajouté ✓','success');showProductDetail(pid);
}

function doRemoveFournisseurFromProduct(productId,fournisseurId){

function addSaleItemRow(){saleItems.push({productId:null,fournisseurId:null,qty:1,priceBought:0,priceSold:0,productName:'',isNew:false});renderSaleItems();}
function removeSaleItem(idx){saleItems.splice(idx,1);renderSaleItems();}
function renderSaleItems(){

    fOpts+=`<option value="new">+ Nouveau fournisseur</option>`;

    const pp=it.productId?DB.products.find(x=>x.id===it.productId):null;

function onSaleProductChange(idx,val){
  const pid=parseInt(val);if(!pid){saleItems[idx].productId=null;saleItems[idx].productName='';renderSaleItems();return;}
  saleItems[idx].productId=pid;saleItems[idx].productName='';saleItems[idx]._newFourn=false;
  const pp=DB.products.find(x=>x.id===pid);
  if(pp){saleItems[idx].productName=pp.name;const ni=document.getElementById('si-new-'+idx);if(ni)ni.value='';if(pp.items.length){const it=pp.items[0];saleItems[idx].fournisseurId=it.fournisseurId;saleItems[idx].priceBought=it.priceBought||0;saleItems[idx].priceSold=it.priceSell||it.priceBought*1.2||0;}}
  renderSaleItems();
}
function onSaleProductNew(idx,val){if(val.trim()){saleItems[idx].productName=val.trim();saleItems[idx].productId=null;updateSaleSummary();}}
function onSaleFournChange(idx,sel){
  const val=sel.value;
  if(val==='new'){saleItems[idx]._newFourn=true;renderSaleItems();return;}
  saleItems[idx]._newFourn=false;
  const opt=sel.options[sel.selectedIndex];if(!opt||!opt.value)return;
  saleItems[idx].fournisseurId=parseInt(opt.value);
  const buy=parseFloat(opt.dataset.buy),sell=parseFloat(opt.dataset.sell);
  if(buy>0){saleItems[idx].priceBought=buy;const el=document.getElementById('si-buy-'+idx);if(el)el.value=buy.toFixed(2);}
  if(sell>0){saleItems[idx].priceSold=sell;const el=document.getElementById('si-sell-'+idx);if(el)el.value=sell.toFixed(2);}
  renderSaleItems();
}
function onSaleItemChange(idx){
  const buy=parseFloat(document.getElementById('si-buy-'+idx)?.value)||0;
  const sell=parseFloat(document.getElementById('si-sell-'+idx)?.value)||0;
  const qty=parseInt(document.getElementById('si-qty-'+idx)?.value)||1;
  saleItems[idx].priceBought=buy;saleItems[idx].priceSold=sell;saleItems[idx].qty=qty;
  updateSaleSummary();
}
function updateSaleSummary(){
  const total=saleItems.reduce((a,i)=>a+(i.priceSold||0)*(i.qty||0),0);
  const gain=saleItems.reduce((a,i)=>a+((i.priceSold||0)-(i.priceBought||0))*(i.qty||0),0);
  const paidEl=document.getElementById('s-paid');const paid=paidEl?parseFloat(paidEl.value)||0:0;const rest=Math.max(0,total-paid);
  const sc=document.getElementById('sale-summary');
  if(sc&&total>0)sc.innerHTML=`<div class="stat-card"><div class="fbet"><span class="tmut">Total</span><span class="bold sv-blue">${fmt(total)}</span></div><div class="fbet mt8"><span class="tmut">Gain Total</span><span class="${gain>=0?'tsuc':'tdan'} bold">${fmt(gain)}</span></div></div>`;
  const cc=document.getElementById('s-credit');
  if(cc){if(paid>0&&rest>0)cc.innerHTML=`<div class="al alw">${ico('pending')} Reste: <strong>${fmt(rest)}</strong> → crédit automatique</div>`;else if(paid>=total&&total>0)cc.innerHTML=`<div class="al als">${ico('check_circle')} Paiement complet ✓</div>`;else cc.innerHTML='';}
}
function saveSale(){
  saleItems.forEach((it,idx)=>{
    const buyEl=document.getElementById('si-buy-'+idx),sellEl=document.getElementById('si-sell-'+idx),qtyEl=document.getElementById('si-qty-'+idx),newEl=document.getElementById('si-new-'+idx);
    if(buyEl)it.priceBought=parseFloat(buyEl.value)||0;if(sellEl)it.priceSold=parseFloat(sellEl.value)||0;if(qtyEl)it.qty=parseInt(qtyEl.value)||1;if(newEl&&newEl.value.trim()&&!it.productId)it.productName=newEl.value.trim();
  });
  let cid=parseInt(document.getElementById('s-client').value);const cnew=document.getElementById('s-client-new').value.trim();
  if(!cid&&cnew){const nc={id:dbId(),name:cnew,phone:'',email:'',address:'',notes:'',createdAt:ts(),autoCreated:true};DB.clients.push(nc);cid=nc.id;}
  if(!cid)return snack('Client requis','danger');
  if(!saleItems.length)return snack('Ajoutez au moins un article','danger');
  for(let idx=0;idx<saleItems.length;idx++){
    const it=saleItems[idx];const name=it.productName||(it.productId?DB.products.find(x=>x.id===it.productId)?.name:'');
    if(!name)return snack(`Article ${idx+1}: nom requis`,'danger');
    if(!it.priceSold||it.priceSold<=0)return snack(`Article ${idx+1}: prix de vente requis`,'danger');
    if(!it.qty||it.qty<=0)return snack(`Article ${idx+1}: quantité requise`,'danger');
  }
  const paid=parseFloat(document.getElementById('s-paid').value)||0;
  const date=document.getElementById('s-date').value||new Date().toISOString().slice(0,16);
  const finalItems=[];
  for(let idx=0;idx<saleItems.length;idx++){
    const si=saleItems[idx];let pid=si.productId;const pname=si.productName||(pid?DB.products.find(x=>x.id===pid)?.name:'');
    let fid=si.fournisseurId;
    if(si._newFourn){const nfEl=document.getElementById('si-new-fourn-'+idx);const nfName=nfEl?nfEl.value.trim():'';if(nfName){const nf={id:dbId(),name:nfName,phone:'',email:'',address:'',createdAt:ts(),autoCreated:true};DB.fournisseurs.push(nf);fid=nf.id;}}
    if(!pid&&pname){const existing=DB.products.find(p=>p.name.toLowerCase()===pname.toLowerCase());if(existing)pid=existing.id;else{const np={id:dbId(),name:pname,category:'',unit:'pcs',description:'',createdAt:ts(),items:[],autoCreated:true};DB.products.push(np);pid=np.id;}}
    const pp=DB.products.find(x=>x.id===pid);
    if(!fid){if(pp&&pp.items.length)fid=pp.items[0].fournisseurId;if(!fid){const nf={id:dbId(),name:'Fourn. '+pname,phone:'',email:'',address:'',createdAt:ts(),autoCreated:true};DB.fournisseurs.push(nf);fid=nf.id;}}
    if(pp){
      let item=pp.items.find(i=>i.fournisseurId===fid);
      if(!item){item={fournisseurId:fid,priceBought:si.priceBought||0,priceSell:si.priceSold,qty:0,addedAt:ts()};pp.items.push(item);if(pp.autoCreated&&fid&&si.priceBought>0)pp.autoCreated=false;}
      // Deduct from current stock state
      item.qty=Math.max(0,(item.qty||0)-si.qty);
      if(si.priceBought>0)item.priceBought=si.priceBought;
    }
    finalItems.push({productId:pid,productName:pname,fournisseurId:fid,priceBought:si.priceBought||0,priceSold:si.priceSold,qty:si.qty});
  }
  const sale={id:dbId(),clientId:cid,items:finalItems,date:new Date(date).toISOString(),payments:paid>0?[{amount:paid,date:ts(),note:'Paiement initial'}]:[],notes:document.getElementById('s-notes').value,createdAt:ts()};
  DB.sales.push(sale);scheduleSave();closeModal();
  const totG=finalItems.reduce((a,i)=>(a+(i.priceSold-i.priceBought)*i.qty),0);
  snack(`Vente enregistrée — Gain: ${fmt(totG)} ✓`,'success');
}

function savePay(sid){
  const s=DB.sales.find(x=>x.id===sid);if(!s)return;

// ANALYTICS — state-based stock cost
// ══════════════════════════════════════════
function renderAnalytics(){
  const pl={today:"Aujourd'hui",week:'7 jours',month:'Ce mois',year:'Cette année',all:'Tout'};
  const sales=filterSalesByAnalytics(analyticsPeriod);
  const pg={};
  sales.forEach(s=>{
    const items=s.items||[{productId:s.productId,productName:s.productName,fournisseurId:s.fournisseurId,priceBought:s.priceBought,priceSold:s.priceSold,qty:s.qty}];
    items.forEach(it=>{const k=`${it.productName||it.productId}`;if(!pg[k])pg[k]={name:it.productName,gain:0,rev:0,cost:0,qty:0};pg[k].gain+=(it.priceSold-it.priceBought)*it.qty;pg[k].rev+=it.priceSold*it.qty;pg[k].cost+=it.priceBought*it.qty;pg[k].qty+=it.qty;});
  });
  const ga=Object.values(pg).sort((a,b)=>b.gain-a.gain);
  const tg=ga.reduce((s,v)=>s+v.gain,0);const tr=ga.reduce((s,v)=>s+v.rev,0);const tc=ga.reduce((s,v)=>s+v.cost,0);
  // Expenses scoped to the same analytics period
  const now2=new Date();
  let expFrom=null,expTo=null;
  if(analyticsPeriod==='today'){expFrom=new Date(now2);expFrom.setHours(0,0,0,0);expTo=now2;}
  else if(analyticsPeriod==='week'){expFrom=new Date(now2);expFrom.setDate(now2.getDate()-6);expFrom.setHours(0,0,0,0);expTo=now2;}
  else if(analyticsPeriod==='month'){expFrom=new Date(now2);expFrom.setDate(1);expFrom.setHours(0,0,0,0);expTo=now2;}
  else if(analyticsPeriod==='year'){expFrom=new Date(now2);expFrom.setMonth(0,1);expFrom.setHours(0,0,0,0);expTo=now2;}
  const manualExp=getManualExpensesTotal(expFrom,expTo);
  const netGain=tg-manualExp;
  // State-based current stock value (not from history)
  const currentStockVal=getInventoryValue();

  return`<div class="page">
  <div style="font-size:20px;font-weight:700;margin-bottom:16px">Statistiques</div>
  <div class="tabs">${['today','week','month','year','all'].map(p=>`<button class="tb ${analyticsPeriod===p?'active':''}" onclick="analyticsPeriod='${p}';renderPage('analytics')">${pl[p]}</button>`).join('')}</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Revenu Total</div><div class="stat-value sv-blue">${fmt(tr)}</div></div>
    <div class="stat-card"><div class="stat-label">Gain Brut</div><div class="stat-value ${tg>=0?'sv-pos':'sv-neg'}">${fmt(tg)}</div></div>
    <div class="stat-card"><div class="stat-label">Coût Ventes</div><div class="stat-value sv-neg">${fmt(tc)}</div></div>
    <div class="stat-card"><div class="stat-label">Nb Ventes</div><div class="stat-value">${sales.length}</div></div>
    <div class="stat-card" style="grid-column:span 2"><div class="stat-label">💵 Gain Net (après dépenses manuelles)</div><div class="stat-value ${netGain>=0?'sv-pos':'sv-neg'}">${fmt(netGain)}</div><div class="tsm tmut" style="margin-top:4px">Dépenses manuelles: ${fmt(manualExp)}</div></div>
  </div>
  <!-- VALEUR STOCK ACTUEL — state-based -->
  <div class="card">
    <div class="card-title">${ico('warehouse')} Valeur Stock Actuel</div>
    <div class="al ali" style="margin-bottom:8px">${ico('info')} Calculé sur les quantités et prix d'achat actuels uniquement.</div>
    <div class="fbet"><span class="tmut">Valeur totale du stock</span><span class="tpri bold">${fmt(currentStockVal)}</span></div>
  </div>
  <!-- DEPENSES MANUELLES -->
  <div class="card">
    <div class="card-title">${ico('payments')} Dépenses Manuelles</div>
    <div class="fbet"><span class="tmut">Total dépenses manuelles</span><span class="tdan bold">${fmt(manualExp)}</span></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn bo bsm" style="flex:1" onclick="showExpenseModal()">${ico('add')} Ajouter</button>
      <button class="btn bo bsm" style="flex:1" onclick="showAllExpenses()">${ico('history')} Historique</button>
    </div>
  </div>
  <!-- HISTORIQUE ACHATS — pure log, no accumulative total -->
  <div class="card">
    <div class="card-title">${ico('local_shipping')} Journal des Achats (Stock)</div>
    <div class="al ali" style="margin-bottom:8px">${ico('info')} Chronologie des opérations. Les totaux sont basés sur le stock actuel.</div>
    <button class="btn bo bsm bfull" onclick="showPurchaseHistory()">${ico('history')} Voir journal achats</button>
  </div>
  <div class="card"><div class="card-title">${ico('insights')} Gain par Article</div>
  ${ga.length?ga.map(g=>{const p=tg>0?(g.gain/tg*100):0;const m=g.rev>0?(g.gain/g.rev*100):0;return`<div style="margin-bottom:14px"><div class="fbet"><span class="bold">${esc(g.name)}</span><span class="tsm tmut">${g.qty}u</span></div><div class="fbet mt8"><span class="tsm">Gain: <span class="${g.gain>=0?'tsuc':'tdan'}">${fmt(g.gain)}</span></span><span class="tsm tmut">Achat: ${fmt(g.cost)} · Marge: ${m.toFixed(1)}%</span></div><div class="prog mt8"><div class="progb ${g.gain>=0?'green':'yellow'}" style="width:${Math.abs(p)}%"></div></div></div>`;}).join('<hr class="div">'):`<p class="tmut tsm">Aucune vente.</p>`}</div>
  <div class="card"><div class="card-title">${ico('people')} Meilleurs Clients</div>
  ${DB.clients.map(c=>{const ss=DB.sales.filter(x=>x.clientId===c.id);return{name:c.name,id:c.id,vol:ss.reduce((a,v)=>a+getSaleTotal(v),0),gain:ss.reduce((a,v)=>a+getSaleGain(v),0)};}).sort((a,b)=>b.vol-a.vol).slice(0,5).map((c,i)=>`<div class="fbet mt8" style="cursor:pointer" onclick="showClientDetail(${c.id})"><div class="fctr"><span style="font-size:18px">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span>${esc(c.name)}</div><div class="tsm" style="text-align:right"><div class="tpri">${fmt(c.vol)}</div><div class="tsuc">+${fmt(c.gain)}</div></div></div>`).join('')||`<p class="tmut tsm">Aucune donnée.</p>`}</div>
  </div>`;
}

function filterSalesByAnalytics(p){
  const now=new Date(),s=new Date(now);
  if(p==='today'){s.setHours(0,0,0,0);}else if(p==='week'){s.setDate(now.getDate()-6);s.setHours(0,0,0,0);}else if(p==='month'){s.setDate(1);s.setHours(0,0,0,0);}else if(p==='year'){s.setMonth(0,1);s.setHours(0,0,0,0);}else return DB.sales;
  return DB.sales.filter(x=>{const d=new Date(x.date);return d>=s&&d<=now;});
}

function saveRem(cid){const date=document.getElementById('rem-date').value;if(!date)return snack('Date requise','danger');DB.reminders.push({id:dbId(),clientId:cid,date:new Date(date).toISOString(),note:document.getElementById('rem-note').value,done:false,createdAt:ts()});scheduleSave();closeModal();snack('Rappel créé ✓','success');}

function doneRem(id){const r=DB.reminders.find(x=>x.id===id);if(r)r.done=true;scheduleSave();closeModal();snack('Rappel terminé ✓','success');}

// ══ DELETE ══
function confirmDel(type,id){
  const lb={product:'cet article',client:'ce client',fournisseur:'ce fournisseur',sale:'cette vente'};
  showModal(`<div class="mtitle" style="color:var(--danger)">${ico('warning')} Confirmer Suppression</div><div class="al ald">${ico('delete_forever')} Supprimer ${lb[type]||'cet élément'}? Action irréversible!</div><div class="fctr mt16" style="gap:8px"><button class="btn bo" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn bd" style="flex:1" onclick="doDel('${type}',${id})">Supprimer</button></div>`);
}
function doDel(type,id){
  switch(type){
    case 'product':{
      const p=DB.products.find(x=>x.id===id);
      if(p){
        // Log deletion of all current stock before removing
        p.items.forEach(i=>{
          if((i.qty||0)>0)logPurchaseHistory('stock_delete',id,i.fournisseurId,i.qty||0,i.priceBought||0,'Article supprimé');
        });
      }
      DB.products=DB.products.filter(x=>x.id!==id);
      // Clean up stock history for this product
      DB.stockHistory=(DB.stockHistory||[]).filter(h=>h.productId!==id);
      break;
    }
    case 'client':
      DB.clients=DB.clients.filter(x=>x.id!==id);
      DB.sales=DB.sales.filter(x=>x.clientId!==id);
      break;
    case 'fournisseur':
      DB.fournisseurs=DB.fournisseurs.filter(x=>x.id!==id);
      break;
    case 'sale':{
      const s=DB.sales.find(x=>x.id===id);
      if(s){
        // When deleting a sale, restore stock (sale is reversed)
        const items=s.items||[{productId:s.productId,fournisseurId:s.fournisseurId,qty:s.qty}];
        items.forEach(it=>{
          const p=DB.products.find(x=>x.id===it.productId);
          if(p){const i=p.items.find(i=>i.fournisseurId===it.fournisseurId);if(i)i.qty=(i.qty||0)+it.qty;}
        });
      }
      DB.sales=DB.sales.filter(x=>x.id!==id);
      break;
    }
  }
  scheduleSave();closeModal();snack('Supprimé ✓','success');
}
